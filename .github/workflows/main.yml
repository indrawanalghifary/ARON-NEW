name: Build & Release PyInstaller

on:
  push:
    # keep tag-based release trigger
    tags:
      - "v*"
    # also build on any branch push (change to specific branches if desired)
    branches:
      - "**"
  # build on PRs as well for CI feedback
  pull_request:
    branches:
      - "**"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # install packages pinned in requirements.txt (includes pyinstaller)
          python -m pip install -r requirements.txt

      - name: Build using spec file
        run: pyinstaller main.spec

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ matrix.os }}
          path: dist/

  release:
    # only create a GitHub Release when this workflow was triggered by a tag push
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
