name: Build & Release PyInstaller

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.9"

      - name: Cache pip
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build application
        run: pyinstaller main.spec

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path * -DestinationPath ..\aron-windows-${{ github.ref_name }}.zip

      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: windows
          path: aron-windows-${{ github.ref_name }}.zip

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf ../aron-linux-${{ github.ref_name }}.tar.gz *

      - name: Upload Linux Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: linux
          path: aron-linux-${{ github.ref_name }}.tar.gz

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../aron-macos-${{ github.ref_name }}.zip *

      - name: Upload macOS Artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: macos
          path: aron-macos-${{ github.ref_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/linux/*
            artifacts/macos/*
